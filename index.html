<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:#000;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;}
.container{position:relative;z-index:1;width:100%;max-width:420px;padding:3rem 1.5rem 4rem;display:flex;flex-direction:column;align-items:center;}
.avatar{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#2a2a2a,#111);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:#fff;letter-spacing:-1px;margin-bottom:1.25rem;animation:fadeUp 0.6s ease both;}
.handle{font-family:'Syne',sans-serif;font-weight:800;font-size:1.75rem;color:#fff;letter-spacing:-0.5px;margin-bottom:0.5rem;animation:fadeUp 0.6s ease 0.1s both;}
.bio{font-size:0.875rem;color:rgba(255,255,255,0.45);font-weight:300;margin-bottom:2.5rem;animation:fadeUp 0.6s ease 0.15s both;}
.links{width:100%;display:flex;flex-direction:column;gap:12px;}
.link-card{display:flex;align-items:center;gap:16px;padding:1rem 1.25rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;text-decoration:none;color:#fff;transition:background 0.2s,border-color 0.2s,transform 0.15s;animation:fadeUp 0.6s ease both;}
.link-card:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.18);transform:translateY(-1px);}
.link-card:active{transform:scale(0.98);}
.link-card:nth-child(1){animation-delay:0.2s;}
.link-card:nth-child(2){animation-delay:0.28s;}
.link-card:nth-child(3){animation-delay:0.36s;}
.icon-wrap{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-discord{background:rgba(88,101,242,0.18);border:1px solid rgba(88,101,242,0.25);}
.icon-instagram{background:rgba(225,48,108,0.15);border:1px solid rgba(225,48,108,0.22);}
.icon-tiktok{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);}
.icon-wrap svg{width:20px;height:20px;}
.link-text{flex:1;}
.link-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:#fff;margin-bottom:2px;}
.link-handle{font-size:0.78rem;color:rgba(255,255,255,0.38);}
.arrow{color:rgba(255,255,255,0.2);font-size:18px;transition:color 0.2s,transform 0.2s;}
.link-card:hover .arrow{color:rgba(255,255,255,0.5);transform:translateX(3px);}
.music-bar{display:flex;align-items:center;gap:10px;margin-top:2.5rem;padding:10px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:100px;animation:fadeUp 0.6s ease 0.45s both;cursor:pointer;transition:background 0.2s;}
.music-bar:hover{background:rgba(255,255,255,0.08);}
.music-icon{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}
.music-icon svg{width:12px;height:12px;}
.music-info{display:flex;flex-direction:column;}
.music-label{font-size:0.7rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.8px;}
.music-title{font-size:0.78rem;color:rgba(255,255,255,0.6);font-weight:400;}
.bars{display:flex;align-items:flex-end;gap:2px;height:14px;margin-left:auto;}
.bar{width:3px;background:rgba(255,255,255,0.3);border-radius:2px;animation:none;}
.playing .bar:nth-child(1){animation:bounce 0.8s ease-in-out infinite;}
.playing .bar:nth-child(2){animation:bounce 0.8s ease-in-out 0.15s infinite;}
.playing .bar:nth-child(3){animation:bounce 0.8s ease-in-out 0.3s infinite;}
.playing .bar:nth-child(4){animation:bounce 0.8s ease-in-out 0.45s infinite;}
@keyframes bounce{0%,100%{height:4px;}50%{height:14px;background:rgba(255,255,255,0.6);}}
.footer{margin-top:2rem;font-size:0.7rem;color:rgba(255,255,255,0.15);animation:fadeUp 0.6s ease 0.5s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<audio id="bgAudio" src="song.mp3" preload="auto" loop></audio>

<script>
let isPlaying = false;
const audio = document.getElementById('bgAudio');
const musicBar = document.getElementById('musicBar');
const bars = document.getElementById('bars');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const musicTitle = document.getElementById('musicTitle');

function toggleMusic() {
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    bars.classList.remove('playing');
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
    musicTitle.textContent = 'tap to play';
  } else {
    audio.play().catch(err => console.log('Audio play failed:', err));
    isPlaying = true;
    bars.classList.add('playing');
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'block';
    musicTitle.textContent = 'now playing';
  }
}

// Handle audio end
audio.addEventListener('ended', () => {
  isPlaying = false;
  bars.classList.remove('playing');
  playIcon.style.display = 'block';
  pauseIcon.style.display = 'none';
  musicTitle.textContent = 'tap to play';
});
</script>
